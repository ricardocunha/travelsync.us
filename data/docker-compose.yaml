services:
  mysql:
    image: mysql:8.4
    container_name: travelsync-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: trip
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3336:3306"
    volumes:
      - mysql_data_travelsync:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d:ro

volumes:
  mysql_data_travelsync:
